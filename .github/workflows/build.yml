name: Build & push starplayer

on:
  push:
    branches: [master]
    paths:
      - starplayer.js
      - server.js
      - Dockerfile
      - entrypoint.sh

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/starplayer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
